<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory Replay OS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b, #0b1220);
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 1100px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 20px;
}

.glass {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.sidebar {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.logo {
  font-size: 18px;
  font-weight: 700;
}

.nav-btn {
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

.main {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.header {
  font-size: 22px;
  font-weight: 700;
}

.card {
  padding: 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
}

textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(0,0,0,0.3);
  color: white;
  resize: none;
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: rgba(99,102,241,0.7);
  color: white;
  font-weight: 600;
}

button:hover {
  background: rgba(99,102,241,0.9);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
  }
  .grid {
    grid-template-columns: 1fr;
  }
  .sidebar {
    flex-direction: row;
    overflow-x: auto;
  }
  .nav-btn {
    white-space: nowrap;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar glass">
    <div class="logo">📼 Memory OS</div>
    <div class="nav-btn">📅 Today Log</div>
    <div class="nav-btn">🧠 Reflection</div>
    <div class="nav-btn">🌱 Alternate Timeline</div>
    <div class="nav-btn">📊 Insights</div>
  </div>

  <!-- MAIN -->
  <div class="main glass">

    <div class="header">Your Life Replay System</div>

    <!-- TODAY -->
    <div class="card">
      <h3>📅 Today Log</h3>
      <textarea id="today" rows="4" placeholder="What happened today..."></textarea>
      <button onclick="save('today')">Save Entry</button>
    </div>

    <div class="grid">

      <!-- REFLECTION -->
      <div class="card">
        <h3>🧠 Reflection</h3>
        <textarea id="reflection" rows="6" placeholder="What went well? What didn’t?"></textarea>
        <button onclick="save('reflection')">Save Reflection</button>
      </div>

      <!-- ALT TIMELINE -->
      <div class="card">
        <h3>🌱 Alternate Timeline</h3>
        <textarea id="alt" rows="6" placeholder="What if you did something differently?"></textarea>
        <button onclick="save('alt')">Save Timeline</button>
      </div>

    </div>

    <div class="card">
      <h3>📊 Weekly Insight</h3>
      <p style="opacity:0.8; margin-top:10px;">
        Your saved data stays in your browser now 💾
      </p>
    </div>

  </div>

</div>

<script>
// ===== SAVE FUNCTION =====
function save(key) {
  const value = document.getElementById(key).value;
  localStorage.setItem("memoryOS_" + key, value);
}

// ===== LOAD FUNCTION =====
function load() {
  const fields = ["today", "reflection", "alt"];

  fields.forEach(id => {
    const saved = localStorage.getItem("memoryOS_" + id);
    if (saved) {
      document.getElementById(id).value = saved;
    }
  });
}

// auto load on start
window.onload = load;
</script>

</body>
  </html>
