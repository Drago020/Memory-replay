<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory OS</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top, #1e293b, #0f172a, #020617);
  color:white;
  display:flex;
  justify-content:center;
  padding:15px;
}

.app{
  width:100%;
  max-width:1200px;
  display:grid;
  grid-template-columns:280px 1fr 300px;
  gap:15px;
}

.glass{
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:16px;
  padding:12px;
}

.sidebar{height:fit-content;}
.logo{font-weight:800;margin-bottom:10px;}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

button{
  background:#6366f1;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
}

.weekdays,.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.day{
  text-align:center;
  padding:6px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  font-size:12px;
}

.day.active{background:#6366f1;}

.main{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
}

textarea{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:rgba(0,0,0,0.3);
  color:white;
  resize:none;
}

.ai input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:rgba(0,0,0,0.3);
  color:white;
}

.result{
  max-height:300px;
  overflow:auto;
  font-size:12px;
}

.item{
  padding:8px;
  background:rgba(255,255,255,0.05);
  margin-bottom:5px;
  border-radius:8px;
  cursor:pointer;
}

@media(max-width:1000px){
  .app{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div class="sidebar glass">
  <div class="logo">📅 Memory OS Cloud</div>

  <!-- PROFILE -->
  <div id="profile" style="margin-bottom:10px;"></div>

  <button onclick="login()">🔐 Login Google</button>

  <div class="calendar-header">
    <button onclick="changeMonth(-1)">⬅</button>
    <div id="monthTitle"></div>
    <button onclick="changeMonth(1)">➡</button>
  </div>

  <div class="weekdays">
    <div>Su</div><div>Mo</div><div>Tu</div>
    <div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
  </div>

  <div class="days" id="cal"></div>
</div>

<!-- CENTER -->
<div class="main glass">

  <h3 id="dateLabel">Today</h3>

  <div class="card">
    📅 Log
    <textarea id="log"></textarea>
  </div>

  <div class="card">
    🧠 Reflection
    <textarea id="ref"></textarea>
  </div>

  <div class="card">
    🌱 Alternate Timeline
    <textarea id="alt"></textarea>
  </div>

  <button onclick="save()">💾 Save to Cloud</button>

</div>

<!-- RIGHT -->
<div class="ai glass">

  <input id="search" placeholder="Search memories..." oninput="search()"/>

  <div class="result" id="results"></div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCCmfnH0P5E7_flM7adLP5RYv9gsA39Js8",
  authDomain: "memory-replay.firebaseapp.com",
  projectId: "memory-replay",
  storageBucket: "memory-replay.firebasestorage.app",
  messagingSenderId: "848253431557",
  appId: "1:848253431557:web:f4860fa15fa6fb9168916c",
  measurementId: "G-LET9G5W3KS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let current = new Date();
let selected = today();

/* DATE */
function today(){
  return new Date().toISOString().split("T")[0];
}

/* PROFILE UI */
function updateProfile(){
  if(!user) return;

  document.getElementById("profile").innerHTML = `
    <div style="
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px;
      margin-bottom:10px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:12px;
    ">
      <img src="${user.photoURL}" style="
        width:40px;
        height:40px;
        border-radius:50%;
      "/>

      <div>
        <div style="font-weight:700;font-size:14px;">
          ${user.displayName || "No Name"}
        </div>
        <div style="font-size:12px;opacity:0.7;">
          ${user.email}
        </div>
      </div>
    </div>
  `;
}

/* LOGIN */
window.login = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  user = result.user;
  updateProfile();
};

onAuthStateChanged(auth,(u)=>{
  user = u;
  if(u) updateProfile();
});

/* SAVE */
window.save = async () => {
  if(!user) return alert("Login first");

  await setDoc(doc(db,"memories",user.uid+"_"+selected),{
    log: document.getElementById("log").value,
    ref: document.getElementById("ref").value,
    alt: document.getElementById("alt").value
  });

  alert("Saved ☁️");
};

/* LOAD */
window.load = async (d) => {
  selected = d;
  document.getElementById("dateLabel").innerText = d;

  if(!user) return;

  const snap = await getDoc(doc(db,"memories",user.uid+"_"+d));

  if(snap.exists()){
    const data = snap.data();
    document.getElementById("log").value = data.log || "";
    document.getElementById("ref").value = data.ref || "";
    document.getElementById("alt").value = data.alt || "";
  }
};

</script>

<script>

/* CALENDAR */
let currentDate = new Date();

function changeMonth(x){
  currentDate.setMonth(currentDate.getMonth()+x);
  render();
}

function render(){
  let y=currentDate.getFullYear();
  let m=currentDate.getMonth();

  document.getElementById("monthTitle").innerText =
  currentDate.toLocaleString('default',{month:'long',year:'numeric'});

  let first=new Date(y,m,1).getDay();
  let last=new Date(y,m+1,0).getDate();

  let c=document.getElementById("cal");
  c.innerHTML="";

  for(let i=0;i<first;i++) c.innerHTML+="<div></div>";

  for(let i=1;i<=last;i++){
    let d=`${y}-${String(m+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;

    let div=document.createElement("div");
    div.className="day";
    div.innerText=i;

    div.onclick=()=>window.load(d);

    c.appendChild(div);
  }
}

render();

</script>

</body>
</html>
